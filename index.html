<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minecraft Mods & Resource Packs</title>
    <style>
        body {
            margin: 0;
            background: #0d0d0d;
            font-family: Arial, sans-serif;
            color: #fff;
        }

        header {
            background: #111;
            padding: 20px;
            text-align: center;
            font-size: 30px;
            font-weight: bold;
            border-bottom: 2px solid #00ff88;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        h2 {
            color: #00ff88;
            margin-top: 40px;
            border-bottom: 1px solid #00ff88;
            padding-bottom: 5px;
        }

        .mod-box {
            background: #1a1a1a;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #00ff88;
        }

        .mod-name {
            font-size: 18px;
            font-weight: bold;
        }

        .download-btn {
            background: #00ff88;
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
        }

        .download-btn:hover {
            background: #00ffaa;
        }
    </style>
</head>
<body>
    <header>Minecraft Mods & Resource Packs</header>

    <div class="container">

        <h2>Моды</h2>

        <!-- ====== ПРИМЕР МОДА ===== -->
        <div class="mod-box">
            <div class="mod-name">Mod Name 1</div>
            <a class="download-btn" href="mods/mod1.jar" download>Скачать</a>
        </div>

        <div class="mod-box">
            <div class="mod-name">Mod Name 2</div>
            <a class="download-btn" href="mods/mod2.jar" download>Скачать</a>
        </div>

        <div class="mod-box">
            <div class="mod-name">Mod Name 3</div>
            <a class="download-btn" href="mods/mod3.jar" download>Скачать</a>
        </div>

        <!-- Дальше добавляй свои -->

        <h2>Ресурс паки</h2>

        <div class="mod-box">
            <div class="mod-name">Resource Pack 1</div>
            <a class="download-btn" href="resourcepacks/pack1.zip" download>Скачать</a>
        </div>

        <div class="mod-box">
            <div class="mod-name">Resource Pack 2</div>
            <a class="download-btn" href="resourcepacks/pack2.zip" download>Скачать</a>
        </div>

    </div>
</body>
</html>
