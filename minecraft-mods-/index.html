<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Mods</title>

    <style>
        body {
            background: #0d0d0d;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            color: white;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .mods {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: #1b1b1b;
            padding: 15px;
            border-radius: 12px;
            transition: 0.2s;
            text-align: center;
        }

        .card:hover {
            transform: scale(1.03);
            background: #232323;
        }

        .card img {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background: #2ecc71;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn:hover {
            background: #27ae60;
        }
    </style>
</head>

<body>

<h1>Сборка модов Minecraft</h1>

<div class="mods">

    <!-- Пример карточки -->
    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/5969/5969053.png">
        <h3>MacroKeybinds</h3>
        <p>Мод для создания макросов и биндов на клавиши.</p>
        <a class="btn" href="1.21-MacroKeybinds-fabric-1.3.1.jar" download>Скачать</a>
    </div>

    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/5969/5969053.png">
        <h3>Command Keys</h3>
        <p>Удобные команды на горячие клавиши.</p>
        <a class="btn" href="CommandKeys-Fabric-1.21-2.0.0.jar" download>Скачать</a>
    </div>

    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/5969/5969053.png">
        <h3>Fabric API</h3>
        <p>Главная библиотека для работы большинства Fabric модов.</p>
        <a class="btn" href="fabric-api-0.102.01.21.jar" download>Скачать</a>
    </div>

    <!-- Я могу добавить ВСЕ твои моды автоматически — скажи да -->

</div>

</body>
</html>
